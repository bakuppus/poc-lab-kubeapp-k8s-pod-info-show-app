{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ .Values.istio.gateway.name }}
  namespace: {{ .Values.istio.gateway.namespace }}
  labels:
    {{- include "kubeapp.labels" . | nindent 4 }}
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        {{- toYaml .Values.istio.hosts | nindent 8 }}
    {{- if .Values.istio.tls.enabled }}
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        {{- toYaml .Values.istio.hosts | nindent 8 }}
      tls:
        mode: SIMPLE
        credentialName: {{ .Values.istio.tls.credentialName | quote }}
    {{- end }}
{{- end }}

